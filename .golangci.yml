version: "2"

linters:
  default: standard
  disable:
    # Temporarily disabled — large codebase has many WIP stubs. Enable once
    # dead-code sweep is done (tracked separately from docs PRs).
    - unused
    # Temporarily disabled — ~120 unchecked return values across the codebase.
    # Re-enable after a dedicated errcheck cleanup pass.
    - errcheck
  exclusions:
    rules:
      # ── staticcheck style suggestions ─────────────────────────────────

      # QF* are quickfix suggestions, not bugs.
      - linters: [staticcheck]
        text: "^QF"
      # S1* are style simplification suggestions.
      - linters: [staticcheck]
        text: "^S1"
      # ST1005 (error strings) — cosmetic, not a bug.
      - linters: [staticcheck]
        text: "^ST1005"
      # SA1012 (nil context) — allow in tests.
      - linters: [staticcheck]
        text: "^SA1012"
        path: "_test\\.go$"
      # SA9003 (empty branch) — placeholder for future logic.
      - linters: [staticcheck]
        text: "^SA9003"
      # SA4006 (unused value) — often intentional in defensive copy tests.
      - linters: [staticcheck]
        text: "^SA4006"
        path: "_test\\.go$"
      # SA4010 (unused append result) — will be cleaned up separately.
      - linters: [staticcheck]
        text: "^SA4010"

      # ── ineffassign ───────────────────────────────────────────────────

      # Allow ineffectual assignments — often intentional reset patterns.
      - linters: [ineffassign]
        path: ".*\\.go$"
