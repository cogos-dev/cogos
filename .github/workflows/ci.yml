name: CI

on:
  push:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o cogos ./cmd/cogos

      - name: Build (with MCP)
        run: go build -tags mcpserver -o cogos-mcp ./cmd/cogos

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Unit tests
        run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        run: go build -o cogos ./cmd/cogos

      - name: Run E2E tests
        run: COGOS_BIN=./cogos ./scripts/e2e-test.sh

  changelog:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check CHANGELOG updated
        run: |
          if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q CHANGELOG.md; then
            echo "::warning file=CHANGELOG.md::CHANGELOG.md was not updated in this PR. Please add a changelog entry describing your changes."
          fi
