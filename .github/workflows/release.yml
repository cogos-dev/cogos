name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X github.com/cogos-dev/cogos/internal/engine.BuildTime=${BUILD_TIME} -X github.com/cogos-dev/cogos/internal/engine.Version=${VERSION}"
          go build -ldflags="${LDFLAGS}" -o "cogos-${GOOS}-${GOARCH}" ./cmd/cogos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cogos-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cogos-${{ matrix.goos }}-${{ matrix.goarch }}

  publish:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in dist/cogos-*; do
            binary=$(basename "$dir")
            cp "$dir/$binary" "release/$binary"
            chmod +x "release/$binary"
            # Create checksum
            (cd release && sha256sum "$binary" >> checksums.txt)
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

  e2e:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Download linux-amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: cogos-linux-amd64

      - name: Run E2E tests against release binary
        run: |
          chmod +x cogos-linux-amd64
          COGOS_BIN=./cogos-linux-amd64 ./scripts/e2e-test.sh
