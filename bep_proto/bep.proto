// BEP v1 message definitions for CogOS agent CRD sync.
// Reference only — not compiled. Go types in bep_proto.go use protowire encoding
// with matching field numbers for wire compatibility with Syncthing BEP v1.
//
// Source: https://docs.syncthing.net/specs/bep-v1.html

syntax = "proto3";
package bep;

// --- Framing ---
// Hello exchange: [4-byte magic 0x2EA7D90B][2-byte length BE][Hello pb]
// Messages:       [4-byte header-length BE][Header pb][4-byte msg-length BE][Message pb]

message Hello {
    string device_name    = 1;
    string client_name    = 2;
    string client_version = 3;
}

message Header {
    MessageType        type        = 1;
    MessageCompression compression = 2;
}

enum MessageType {
    MESSAGE_TYPE_CLUSTER_CONFIG     = 0;
    MESSAGE_TYPE_INDEX              = 1;
    MESSAGE_TYPE_INDEX_UPDATE       = 2;
    MESSAGE_TYPE_REQUEST            = 3;
    MESSAGE_TYPE_RESPONSE           = 4;
    MESSAGE_TYPE_DOWNLOAD_PROGRESS  = 5;
    MESSAGE_TYPE_PING               = 6;
    MESSAGE_TYPE_CLOSE              = 7;
}

enum MessageCompression {
    MESSAGE_COMPRESSION_NONE = 0;
    MESSAGE_COMPRESSION_LZ4  = 1;
}

// --- Cluster Config ---

message ClusterConfig {
    repeated Folder folders = 1;
}

message Folder {
    string          id      = 1;
    string          label   = 2;
    repeated Device devices = 3;
}

message Device {
    bytes  id   = 1;  // 32-byte DeviceID
    string name = 2;
}

// --- Index ---

message Index {
    string            folder = 1;
    repeated FileInfo files  = 2;
}

message IndexUpdate {
    string            folder = 1;
    repeated FileInfo files  = 2;
}

message FileInfo {
    string              name           = 1;
    FileInfoType        type           = 2;
    int64               size           = 3;
    uint32              permissions    = 4;
    int64               modified_s     = 5;
    int32               modified_ns    = 6;
    uint64              modified_by    = 8;
    bool                deleted        = 9;
    bool                invalid        = 10;
    bool                no_permissions = 11;
    Vector              version        = 12;
    int64               sequence       = 13;
    repeated BlockInfo  blocks         = 16;
    string              symlink_target = 17;
    bytes               blocks_hash    = 18;
}

enum FileInfoType {
    FILE_INFO_TYPE_FILE              = 0;
    FILE_INFO_TYPE_DIRECTORY         = 1;
    FILE_INFO_TYPE_SYMLINK_FILE      = 2;
    FILE_INFO_TYPE_SYMLINK_DIRECTORY = 3;
    FILE_INFO_TYPE_SYMLINK           = 4;
}

message BlockInfo {
    int64  offset    = 1;
    int32  size      = 2;
    bytes  hash      = 3;
    uint32 weak_hash = 4;
}

message Vector {
    repeated Counter counters = 1;
}

message Counter {
    uint64 id    = 1;  // short device ID
    uint64 value = 2;
}

// --- Request / Response ---

message Request {
    int32  id             = 1;
    string folder         = 2;
    string name           = 3;
    int64  offset         = 4;
    int32  size           = 5;
    bytes  hash           = 6;
    bool   from_temporary = 7;
}

message Response {
    int32     id   = 1;
    bytes     data = 2;
    ErrorCode code = 3;
}

enum ErrorCode {
    ERROR_CODE_NO_ERROR          = 0;
    ERROR_CODE_GENERIC           = 1;
    ERROR_CODE_NO_SUCH_FILE      = 2;
    ERROR_CODE_INVALID_FILE      = 3;
}

// --- Control ---

message Ping {}

message Close {
    string reason = 1;
}
